<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Залипаю</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Аналоговые ТВ-помехи на весь экран -->
    <div class="tv-noise"></div>

    <!-- ЭКРАН ВХОДА (ИНТРО) -->
    <div id="intro-screen" class="screen">
        <div class="intro-content">
            <!-- Пивная крышка -->
            <div class="beer-cap-trigger" id="cap-btn">
                <div class="cap-ridges"></div>
                <div class="cap-core"></div>
            </div>
            <p class="tap-instruction">КЛИКНИ / ТАПНИ, ЧТОБЫ ОТКРЫТЬ</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main id="main-content" class="main-layout hidden">
        
        <header class="aesthetic-header">
            <h1 class="glitch-text">автостопом по фазе сна</h1>
            <p class="sub-quote">«...в руке бутылка пива»</p>
        </header>

        <!-- АВТОНОМНАЯ ГАЛЕРЕЯ КАРТОЧЕК -->
        <section class="gallery-container">
            <div class="custom-scroll-gallery">
                <!-- Карточка 1 -->
                <div class="scroll-slide">
                    <div class="polaroid-card">
                        <div class="photo-wrapper">
                            <img src="photo1.jpg" onerror="this.onerror=null; this.src='photo1.JPG';" alt="Фото 1">
                        </div>
                        <div class="polaroid-caption">melancholy.jpg</div>
                    </div>
                </div>
                <!-- Карточка 2 -->
                <div class="scroll-slide">
                    <div class="polaroid-card">
                        <div class="photo-wrapper">
                            <img src="photo2.jpg" onerror="this.onerror=null; this.src='photo2.JPG';" alt="Фото 2">
                        </div>
                        <div class="polaroid-caption">lo-fi_mood.jpg</div>
                    </div>
                </div>
                <!-- Карточка 3 -->
                <div class="scroll-slide">
                    <div class="polaroid-card">
                        <div class="photo-wrapper">
                            <img src="photo3.jpg" onerror="this.onerror=null; this.src='photo3.JPG';" alt="Фото 3">
                        </div>
                        <div class="polaroid-caption">escapism.jpg</div>
                    </div>
                </div>
                <!-- Карточка 4 -->
                <div class="scroll-slide">
                    <div class="polaroid-card">
                        <div class="photo-wrapper">
                            <img src="photo4.jpg" onerror="this.onerror=null; this.src='photo4.JPG';" alt="Фото 4">
                        </div>
                        <div class="polaroid-caption">залипаю.jpg</div>
                    </div>
                </div>
                <!-- Карточка 5 -->
                <div class="scroll-slide">
                    <div class="polaroid-card">
                        <div class="photo-wrapper">
                            <img src="photo5.jpg" onerror="this.onerror=null; this.src='photo5.JPG';" alt="Фото 5">
                        </div>
                        <div class="polaroid-caption">underground.jpg</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ПИВНОЙ БАР С КНОПКОЙ -->
        <section class="beer-bar-section">
            <div class="beer-counter-card">
                <span class="counter-label">ВЫПИТО ПИВА ВМЕСТЕ:</span>
                <div class="counter-value"><span id="beer-count">0</span> л</div>
                <button class="add-beer-btn" id="pour-beer-btn">➕ Сделать глоток</button>
            </div>
        </section>

        <!-- ЭКРАН "ЗАЛИПАНИЯ" С ДИНАМИЧЕСКИМ ТЕКСТОМ ПЕСНИ -->
        <div id="idle-screen" class="idle-overlay hidden-fade">
            <div class="idle-content">
                <p class="idle-text-line" id="lyrics-line">Я залипаю в потолок...</p>
                <p class="idle-subtext">пошевели мышкой или коснись экрана, чтобы вернуться</p>
            </div>
        </div>

        <!-- КАССЕТНЫЙ ПЛЕЕР -->
        <footer class="player-footer">
            <div class="cassette-container" id="player-toggle">
                
                <!-- Двойной источник аудио для музыки -->
                <audio id="bg-music" loop prefetch>
                    <source src="music.mp3" type="audio/mpeg">
                    <source src="music.MP3" type="audio/mpeg">
                </audio>

                <!-- Двойной источник для звука пива -->
                <audio id="beer-sound">
                    <source src="beer_open.mp3" type="audio/mpeg">
                    <source src="beer_open.MP3" type="audio/mpeg">
                </audio>

                <div class="cassette-deck">
                    <div class="cassette-window">
                        <div class="tape-wheel left-wheel paused"><div class="wheel-lines"></div></div>
                        <div class="tape-reel"></div>
                        <div class="tape-wheel right-wheel paused"><div class="wheel-lines"></div></div>
                    </div>
                    <div class="cassette-label">
                        <span class="label-artist">АПФС</span>
                        <span class="label-track">Ма, я лаю (A-Side)</span>
                    </div>
                </div>
            </div>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
